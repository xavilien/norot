[server]
host = "127.0.0.1"
port = 8080
proxy_timeout = 30

[filters]
enabled = true
notification_threshold = 0.800000011920929

[filters.rules.educational]
enabled = true
score_threshold = 0.6000000238418579
action = "Allow"
categories = [
    "learning",
    "tutorial",
    "informative",
]

[filters.rules.brainrot]
enabled = true
score_threshold = 0.699999988079071
action = "Block"
categories = [
    "clickbait",
    "mindless_scrolling",
]

[classifier]
enabled = true
model_type = "Mock"
confidence_threshold = 0.6000000238418579

[ui]
enabled = true
theme = "dark"
show_blocked_count = true
